<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquaOS 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<div id="wallpaper">
  <canvas id="stars"></canvas>
  <div id="wallpaper-img"></div>
</div>

<div id="desktop">
  <div id="topbar">
    <div class="tb-logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
      <span>AquaOS</span>
    </div>
    <div class="tb-apps">
      <div class="tb-app active" onclick="openApp('browser')">Приложения</div>
      <div class="tb-app" onclick="openApp('files')">Файлы</div>
      <div class="tb-app" onclick="openApp('settings')">Система</div>
    </div>
    <div class="tb-center">
      <span id="tb-time">00:00:00</span>
      <span style="color:var(--b2)">·</span>
      <span id="tb-date"></span>
    </div>
    <div class="tb-right">
      <div class="tb-sys-icon" title="Сеть">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      </div>
      <div class="tb-sys-icon" title="Звук">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      </div>
      <span class="tb-vol-label">72%</span>
      <div class="tb-sys-icon" title="Питание">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
      <span class="tb-vol-label">85%</span>
    </div>
  </div>

  <div id="desktop-area">
    <!-- Desktop icons generated by JS -->
  </div>

  <div id="dock">
    <div class="d-item" data-app="browser" style="background:linear-gradient(135deg,#1a4a9e,#0d3580)">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
      <div class="d-tip">Браузер</div>
    </div>
    <div class="d-item" data-app="files" style="background:linear-gradient(135deg,#1a6b3a,#0e4a28)">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      <div class="d-tip">Файлы</div>
    </div>
    <div class="d-item" data-app="terminal" style="background:linear-gradient(135deg,#1a1a2e,#12122a)">
      <svg viewBox="0 0 24 24" fill="none" stroke="#27c47a" stroke-width="1.8"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      <div class="d-tip">Терминал</div>
    </div>
    <div class="d-sep"></div>
    <div class="d-item" data-app="calc" style="background:linear-gradient(135deg,#6a1a8a,#4a0e6e)">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="8" y2="10" stroke-width="3" stroke-linecap="round"/><line x1="12" y1="10" x2="12" y2="10" stroke-width="3" stroke-linecap="round"/><line x1="16" y1="10" x2="16" y2="10" stroke-width="3" stroke-linecap="round"/><line x1="8" y1="14" x2="8" y2="14" stroke-width="3" stroke-linecap="round"/><line x1="12" y1="14" x2="12" y2="14" stroke-width="3" stroke-linecap="round"/><line x1="16" y1="14" x2="16" y2="14" stroke-width="3" stroke-linecap="round"/><line x1="8" y1="18" x2="12" y2="18"/><line x1="16" y1="18" x2="16" y2="18" stroke-width="3" stroke-linecap="round"/></svg>
      <div class="d-tip">Калькулятор</div>
    </div>
    <div class="d-item" data-app="editor" style="background:linear-gradient(135deg,#8a6a1a,#6e4a0e)">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <div class="d-tip">Редактор</div>
    </div>
    <div class="d-item" data-app="clock" style="background:linear-gradient(135deg,#1a4a6a,#0e2f4a)">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <div class="d-tip">Часы</div>
    </div>
    <div class="d-sep"></div>
    <div class="d-item" data-app="settings" style="background:linear-gradient(135deg,#3a3a3a,#1a1a1a)">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <div class="d-tip">Настройки</div>
    </div>
    <div class="d-item" data-app="about" style="background:linear-gradient(135deg,#1a4a9e,#0a2a6a)">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div class="d-tip">О системе</div>
    </div>
  </div>
</div>

<div id="notif-area"></div>

<div id="ctx">
  <div class="ctx-i" onclick="openApp('browser')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
    Открыть браузер
  </div>
  <div class="ctx-i" onclick="openApp('files')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
    Файловый менеджер
  </div>
  <div class="ctx-i" onclick="openApp('terminal')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
    Терминал
  </div>
  <div class="ctx-sep"></div>
  <div class="ctx-i" onclick="openApp('settings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41"/></svg>
    Настройки системы
  </div>
  <div class="ctx-i" onclick="openWallpaperPicker()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    Сменить обои
  </div>
  <div class="ctx-sep"></div>
  <div class="ctx-i" onclick="openApp('about')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    О системе
  </div>
</div>

<div id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<script src="/app.js" defer></script>
</body>
</html>
